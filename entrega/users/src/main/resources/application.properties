spring.application.name=users
server.port=${USERS_PORT:5001}

jwt.secret=${JWT_SECRET:dev-secret-change-me}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

storage.users.file=${USERS_STORAGE_FILE:data/users.json}

users.admin.seed.enabled=${USERS_ADMIN_SEED_ENABLED:true}
users.admin.seed.name=${USERS_ADMIN_NAME:Gabriel(Admin)}
users.admin.seed.email=${USERS_ADMIN_EMAIL:gabriel@admin.com}
users.admin.seed.password=${USERS_ADMIN_PASSWORD:admin123}
