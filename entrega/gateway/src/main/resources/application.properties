spring.application.name=gateway
server.port=${GATEWAY_PORT:8080}

jwt.secret=${JWT_SECRET:dev-secret}

services.users.url=${USERS_SERVICE_URL:http://localhost:5001}
services.products.url=${PRODUCTS_SERVICE_URL:http://localhost:5002}
services.products-replica.url=${PRODUCTS_REPLICA_SERVICE_URL:http://localhost:5012}
services.orders.url=${ORDERS_SERVICE_URL:http://localhost:5003}

gateway.heartbeat.interval-ms=${HEARTBEAT_INTERVAL_MS:5000}
gateway.heartbeat.max-failures=${HEARTBEAT_MAX_FAILURES:2}
